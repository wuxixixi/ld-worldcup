name: ✨ 功能请求
description: 提议一个新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      content: |
        ## ✨ 功能请求
        我们欢迎新想法!请清晰描述你希望添加的功能。

  - type: textarea
    id: problem
    attributes:
      label: 🎯 解决的问题
      description: 这个功能解决了什么痛点?
      placeholder: "当前无法看到半决赛的具体比赛时间安排..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 提议的方案
      description: 你建议如何实现?
      placeholder: "在主页添加'下一场比赛倒计时'模块..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 备选方案
      description: 还有其他实现方式吗?
      placeholder: "可以考虑用第三方库 ..."

  - type: textarea
    id: context
    attributes:
      label: 📎 附加上下文
      description: 截图、原型、相关 PR 等