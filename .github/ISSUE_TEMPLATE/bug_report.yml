name: 🐛 Bug 报告
description: 报告一个 Bug 帮助我们改进
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      content: |
        ## 🐛 Bug 报告
        感谢提交 Bug!请填写以下信息以便我们快速定位和修复。

  - type: input
    id: version
    attributes:
      label: 📌 当前版本
      description: 使用的 ld-worldcup 版本(从 `data/matches.json` 的 `meta.version` 读取)
      placeholder: "1.4.0"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 🌐 运行环境
      description: 部署/运行方式
      options:
        - 本地 python -m http.server
        - 腾讯云 Nginx 生产部署
        - GitHub Pages
        - 其他(请在描述中说明)
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: 🖥️ 浏览器
      options:
        - Chrome
        - Edge
        - Firefox
        - Safari
        - 移动端 Chrome
        - 移动端 Safari
        - 其他

  - type: textarea
    id: steps
    attributes:
      label: 📋 复现步骤
      description: 触发 Bug 的具体步骤
      placeholder: |
        1. 打开 https://...
        2. 点击 ...
        3. 看到 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ 预期行为
      description: 期望发生什么
      placeholder: "期望图表显示 6 个柱状图..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ 实际行为
      description: 实际发生了什么
      placeholder: "图表显示空白,控制台报错 ..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📜 错误日志
      description: 浏览器控制台/F12 Network/服务器日志
      placeholder: |
        ```
        ReferenceError: roundOf16_played is not defined
          at app.js:123:45
        ```

  - type: textarea
    id: extra
    attributes:
      label: 📸 截图或其他上下文
      description: 可选:截图、相关链接等