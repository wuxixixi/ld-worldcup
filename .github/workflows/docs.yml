name: 📚 Docs - 文档站部署

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: 📖 构建文档站
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy-docs:
    name: 🌐 部署文档站
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 部署
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ 完成
        if: success()
        run: |
          echo "📚 文档站部署完成"
          echo "🔗 URL: ${{ steps.deployment.outputs.page_url }}"